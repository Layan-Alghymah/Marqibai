<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>السجل التاريخي — مرقب AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --navy:#16173D;--navy2:#132154;--purple:#9C6599;
  --bg:#f0eef8;--card-bg:#ffffff;--text:#16173D;--text-muted:#6b6b8a;
  --border:rgba(22,23,61,0.1);--shadow:0 2px 12px rgba(22,23,61,0.07);
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;
}
[data-theme="dark"]{
  --bg:#080918;--card-bg:#10112a;--text:#e8e8f0;--text-muted:#8080a8;
  --border:rgba(255,255,255,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:all 0.3s;}

.topbar{background:var(--card-bg);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;box-shadow:0 1px 8px rgba(22,23,61,0.05);}
.topbar-logo img{height:36px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.nav-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all 0.2s;}
.nav-btn:hover,.nav-btn.active{background:var(--navy2);color:white;border-color:var(--navy2);}

.container{max-width:880px;margin:0 auto;padding:32px 20px;}
.page-header{margin-bottom:28px;}
.page-title{font-size:26px;font-weight:900;margin-bottom:6px;}
.page-sub{color:var(--text-muted);font-size:14px;}

.card{background:var(--card-bg);border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
.card-body{padding:20px;}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{background:var(--card-bg);border-radius:12px;border:1px solid var(--border);padding:16px;text-align:center;box-shadow:var(--shadow);}
.stat-val{font-size:28px;font-weight:900;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;}

/* TIMELINE */
.week-card{
  border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;
  transition:all 0.2s;cursor:pointer;background:var(--card-bg);
}
.week-card:hover{border-color:var(--purple);box-shadow:0 4px 16px rgba(156,101,153,0.1);}
.week-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
}
.week-left{display:flex;align-items:center;gap:12px;}
.week-num{font-size:12px;color:var(--text-muted);font-weight:600;width:80px;}
.week-status{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.week-info{flex:1;}
.week-title{font-size:14px;font-weight:700;}
.week-date{font-size:11px;color:var(--text-muted);margin-top:2px;}
.week-right{display:flex;align-items:center;gap:12px;}
.week-health{font-size:18px;font-weight:900;}
.badge{padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700;}
.badge-red{background:rgba(239,68,68,0.1);color:var(--red);}
.badge-yellow{background:rgba(245,158,11,0.1);color:var(--yellow);}
.badge-green{background:rgba(34,197,94,0.1);color:var(--green);}
.badge-gray{background:rgba(100,100,120,0.1);color:var(--text-muted);}
.week-expand{font-size:12px;color:var(--text-muted);}
.week-details{
  display:none;padding:14px 18px;border-top:1px solid var(--border);
  background:var(--bg);
}
.week-details.open{display:block;}
.details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px;}
.detail-box{background:var(--card-bg);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.detail-box-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:4px;}
.detail-box-val{font-size:15px;font-weight:700;}
.flags-list{display:flex;flex-direction:column;gap:6px;}
.flag-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);padding:6px 10px;background:var(--card-bg);border-radius:6px;border:1px solid var(--border);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-text{font-size:15px;font-weight:600;margin-bottom:8px;}
.empty-sub{font-size:13px;}

@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .details-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body data-theme="light">

<div class="topbar">
  <div class="topbar-logo"><a href="founder-home.html"><img id="topLogo" src="light_logo.png" alt="مرقب AI"></a></div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="toggleTheme()">🌙</button>
    <a href="founder-home.html" class="nav-btn">🏠 لوحتي</a>
    <a href="founder-weekly-update.html" class="nav-btn">📋 تحديث أسبوعي</a>
    <a href="founder-startup-profile.html" class="nav-btn">📄 ملف المشروع</a>
    <a href="founder-history.html" class="nav-btn active">🕐 السجل</a>
    <a href="founder-consultations.html" class="nav-btn">🤝 استشارات</a>
    <a href="login.html" class="nav-btn">خروج</a>
  </div>
</div>

<div class="container">
  <div class="page-header">
    <div class="page-title">📊 السجل التاريخي</div>
    <div class="page-sub">شركة: <strong>سدرة للاستشارات</strong> • آخر 8 أسابيع</div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow"></div>

  <!-- CHART -->
  <div class="card" style="margin-bottom:20px">
    <div class="card-header">
      <div class="card-title">📈 تطور مؤشر الصحة</div>
    </div>
    <div class="card-body"><canvas id="historyChart" height="160"></canvas></div>
  </div>

  <!-- HISTORY LIST -->
  <div class="card-title" style="margin-bottom:12px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px">
    🗓️ سجل الأسابيع
  </div>
  <div id="historyList"></div>

</div>

<script>
const HISTORY = [
  {
    week:8, date:"٢٢ يناير ٢٠٢٥", health:55, risk:"medium", sent:true,
    goalsPlanned:4, goalsDone:2, revenueCurrent:8000, revenuePrev:6000,
    customersNew:3, retention:45, runway:5, expenseRatio:0.9,
    sessionsOffered:2, sessionsAttended:2,
    flags:["نسبة الإنجاز أقل من 50%","لا يوجد عملاء مؤكدون"],
    recommendation:"جلسة إرشاد لتحديد نموذج العمل",
    highlights:"اجتماع مع أول عميل محتمل",
    challenges:"صعوبة في تحديد جمهور مستهدف واضح"
  },
  {
    week:7, date:"١٥ يناير ٢٠٢٥", health:53, risk:"medium", sent:true,
    goalsPlanned:4, goalsDone:2, revenueCurrent:6000, revenuePrev:5500,
    customersNew:2, retention:40, runway:5.5, expenseRatio:0.95,
    sessionsOffered:1, sessionsAttended:1,
    flags:["نمو الإيرادات بطيء"],
    recommendation:"التركيز على تطوير عرض القيمة",
    highlights:"إطلاق أول نسخة من موقع الشركة",
    challenges:"تأخر في تسليم المحتوى التسويقي"
  },
  {
    week:6, date:"٨ يناير ٢٠٢٥", health:50, risk:"medium", sent:true,
    goalsPlanned:5, goalsDone:3, revenueCurrent:5500, revenuePrev:5000,
    customersNew:1, retention:38, runway:6, expenseRatio:1.0,
    sessionsOffered:2, sessionsAttended:1,
    flags:["لم يحضر جلسة الإرشاد"],
    recommendation:"ضرورة الحضور المنتظم لجلسات الإرشاد",
    highlights:"انتهاء تصميم هوية الشركة",
    challenges:"ضغط مواعيد الدراسة"
  },
  {
    week:5, date:"١ يناير ٢٠٢٥", health:52, risk:"medium", sent:false,
    goalsPlanned:0, goalsDone:0, revenueCurrent:0, revenuePrev:0,
    customersNew:0, retention:0, runway:0, expenseRatio:0,
    sessionsOffered:0, sessionsAttended:0,
    flags:["لم يرسل التحديث الأسبوعي"],
    recommendation:"التزم بإرسال التحديث الأسبوعي",
    highlights:"", challenges:""
  },
  {
    week:4, date:"٢٥ ديسمبر ٢٠٢٤", health:48, risk:"medium", sent:true,
    goalsPlanned:3, goalsDone:2, revenueCurrent:5000, revenuePrev:4200,
    customersNew:2, retention:35, runway:7, expenseRatio:0.85,
    sessionsOffered:1, sessionsAttended:1,
    flags:["معدل الاحتفاظ منخفض (35%)"],
    recommendation:"تحسين تجربة العملاء الحاليين",
    highlights:"توقيع عقد مع أول عميل مؤسسي",
    challenges:"صعوبة في التواصل مع العملاء بعد البيع"
  },
  {
    week:3, date:"١٨ ديسمبر ٢٠٢٤", health:45, risk:"medium", sent:true,
    goalsPlanned:4, goalsDone:2, revenueCurrent:4200, revenuePrev:3800,
    customersNew:1, retention:30, runway:7.5, expenseRatio:0.9,
    sessionsOffered:2, sessionsAttended:2,
    flags:["نسبة الإنجاز أقل من 60%"],
    recommendation:"مراجعة أولويات الأهداف الأسبوعية",
    highlights:"حضور فعالية شبكية مع 5 شركاء محتملين",
    challenges:"كثرة الأهداف وضعف التركيز"
  },
  {
    week:2, date:"١١ ديسمبر ٢٠٢٤", health:42, risk:"medium", sent:true,
    goalsPlanned:3, goalsDone:1, revenueCurrent:3800, revenuePrev:3500,
    customersNew:1, retention:28, runway:8, expenseRatio:1.1,
    sessionsOffered:1, sessionsAttended:1,
    flags:["نسبة الإنجاز أقل من 40%","نسبة المصروف مرتفعة نسبيًا"],
    recommendation:"مراجعة الميزانية وخفض المصروفات",
    highlights:"انتهاء دراسة السوق الأولية",
    challenges:"ارتفاع تكاليف التسويق الرقمي"
  },
  {
    week:1, date:"٤ ديسمبر ٢٠٢٤", health:38, risk:"high", sent:true,
    goalsPlanned:5, goalsDone:1, revenueCurrent:3500, revenuePrev:3000,
    customersNew:0, retention:0, runway:8.5, expenseRatio:1.2,
    sessionsOffered:2, sessionsAttended:2,
    flags:["نسبة إنجاز منخفضة جدًا (20%)","لا يوجد عملاء","نسبة مصروف مرتفعة"],
    recommendation:"مراجعة عاجلة مع مرشد الحاضنة",
    highlights:"الانضمام للحاضنة والبدء رسميًا",
    challenges:"ضبابية الرؤية والتوجه الأول"
  }
];

// RENDER STATS
function renderStats() {
  const sent = HISTORY.filter(w=>w.sent).length;
  const commitRate = Math.round((sent/HISTORY.length)*100);
  const avgHealth = Math.round(HISTORY.filter(w=>w.sent).reduce((s,w)=>s+w.health,0)/sent);
  const latest = HISTORY[0].health;
  const first = HISTORY[HISTORY.length-1].health;
  const trend = latest - first;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${HISTORY.length}</div>
      <div class="stat-label">أسابيع في الحاضنة</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${avgHealth>=70?'var(--green)':avgHealth>=45?'var(--yellow)':'var(--red)'}">${avgHealth}</div>
      <div class="stat-label">متوسط مؤشر الصحة</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${commitRate>=80?'var(--green)':commitRate>=60?'var(--yellow)':'var(--red)'}">${commitRate}%</div>
      <div class="stat-label">معدل الالتزام</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${trend>=0?'var(--green)':'var(--red)'}">${trend>=0?'+':''}${trend}</div>
      <div class="stat-label">التغيّر الكلي</div>
    </div>
  `;
}

// RENDER CHART
function renderChart() {
  const ctx = document.getElementById('historyChart');
  const sorted = [...HISTORY].reverse();
  const labels = sorted.map(w=>`أسبوع ${w.week}`);
  const data = sorted.map(w=>w.sent?w.health:null);
  const bgColors = sorted.map(w=>w.sent?(w.health>=70?'rgba(34,197,94,0.8)':w.health>=45?'rgba(245,158,11,0.8)':'rgba(239,68,68,0.8)'):'rgba(200,200,220,0.5)');

  new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'مؤشر الصحة',data,
        borderColor:'#9C6599',
        backgroundColor:'rgba(156,101,153,0.1)',
        borderWidth:2.5,fill:true,tension:0.4,
        pointBackgroundColor:bgColors,
        pointRadius:6,pointHoverRadius:8,
        spanGaps:false
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`الصحة: ${ctx.raw}`}}
      },
      scales:{
        y:{min:0,max:100,grid:{color:'rgba(0,0,0,0.04)'}},
        x:{grid:{display:false}}
      }
    }
  });
}

// RENDER LIST
function renderList() {
  if (!HISTORY.length) {
    document.getElementById('historyList').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div class="empty-text">لا توجد بيانات بعد</div>
        <div class="empty-sub">أرسل أول تحديث أسبوعي لتبدأ سجلك</div>
      </div>`;
    return;
  }

  document.getElementById('historyList').innerHTML = HISTORY.map((w,i)=>{
    const riskLabel = w.risk==='high'?'مرتفع':w.risk==='medium'?'متوسط':'منخفض';
    const riskBadge = w.risk==='high'?'badge-red':w.risk==='medium'?'badge-yellow':'badge-green';
    const healthColor = w.health>=70?'var(--green)':w.health>=45?'var(--yellow)':'var(--red)';
    const statusColor = w.sent?'var(--green)':'var(--red)';

    return `
      <div class="week-card" onclick="toggleWeek(${i})">
        <div class="week-header">
          <div class="week-left">
            <div class="week-num">أسبوع ${w.week}</div>
            <div class="week-status" style="background:${statusColor}"></div>
            <div class="week-info">
              <div class="week-title">${w.date}</div>
              <div class="week-date">${w.sent?'✅ تم الإرسال':'❌ لم يُرسل'}</div>
            </div>
          </div>
          <div class="week-right">
            ${w.sent?`<div class="week-health" style="color:${healthColor}">${w.health}</div>`:
              '<div class="week-health" style="color:var(--text-muted)">—</div>'}
            <span class="badge ${w.sent?riskBadge:'badge-gray'}">${w.sent?riskLabel:'غائب'}</span>
            <div class="week-expand" id="arrow-${i}">▼</div>
          </div>
        </div>
        <div class="week-details" id="details-${i}">
          ${w.sent?`
            <div class="details-grid">
              <div class="detail-box"><div class="detail-box-label">الإنجاز</div><div class="detail-box-val" style="color:${w.goalsPlanned>0?(w.goalsDone/w.goalsPlanned>=0.7?'var(--green)':w.goalsDone/w.goalsPlanned>=0.4?'var(--yellow)':'var(--red)'):'var(--text-muted)'}">${w.goalsDone}/${w.goalsPlanned}</div></div>
              <div class="detail-box"><div class="detail-box-label">الإيراد</div><div class="detail-box-val">${w.revenueCurrent.toLocaleString('ar-SA')} ر.س</div></div>
              <div class="detail-box"><div class="detail-box-label">عملاء جدد</div><div class="detail-box-val">${w.customersNew}</div></div>
              <div class="detail-box"><div class="detail-box-label">Runway</div><div class="detail-box-val" style="color:${w.runway>=6?'var(--green)':w.runway>=3?'var(--yellow)':'var(--red)'}">${w.runway} شهر</div></div>
              <div class="detail-box"><div class="detail-box-label">نسبة المصروف</div><div class="detail-box-val" style="color:${w.expenseRatio<=1?'var(--green)':w.expenseRatio<=1.5?'var(--yellow)':'var(--red)'}">${w.expenseRatio}</div></div>
              <div class="detail-box"><div class="detail-box-label">الجلسات</div><div class="detail-box-val">${w.sessionsAttended}/${w.sessionsOffered}</div></div>
            </div>
            ${w.highlights?`<div style="margin-bottom:10px;font-size:13px"><strong>✨ أبرز الإنجازات:</strong> ${w.highlights}</div>`:''}
            ${w.challenges?`<div style="margin-bottom:10px;font-size:13px"><strong>🚧 التحديات:</strong> ${w.challenges}</div>`:''}
            <div class="flags-list">
              ${w.flags.map(f=>`<div class="flag-item">⚠️ ${f}</div>`).join('')}
              ${!w.flags.length?'<div class="flag-item" style="color:var(--green)">✅ لا توجد تنبيهات</div>':''}
            </div>
            <div style="margin-top:10px;padding:10px 12px;border-radius:8px;background:var(--card-bg);border:1px solid var(--border);font-size:13px">
              <strong>توصية مرقب:</strong> ${w.recommendation}
            </div>
          `:`<div style="padding:8px;color:var(--text-muted);font-size:13px">لم يُرسل التحديث هذا الأسبوع</div>`}
        </div>
      </div>
    `;
  }).join('');
}

function toggleWeek(i) {
  const details = document.getElementById(`details-${i}`);
  const arrow = document.getElementById(`arrow-${i}`);
  const isOpen = details.classList.contains('open');
  details.classList.toggle('open', !isOpen);
  arrow.textContent = isOpen ? '▼' : '▲';
}

function toggleTheme() {
  const isDark = document.body.dataset.theme==='dark';
  document.body.dataset.theme = isDark?'light':'dark';
  document.querySelector('.icon-btn').textContent = isDark?'🌙':'☀️';
  document.getElementById('topLogo').src = isDark?'light_logo.png':'dark_logo.png';
}

// Init
renderStats();
renderChart();
renderList();
</script>
</body>
</html>
